name: Build VST3 (Windows)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run the workflow manually from the Actions tab

jobs:
  build-windows-vst3:
    name: Build Windows VST3
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify required assets
      shell: pwsh
      run: |
        if (-Not (Test-Path "Assets/KnobFilmstrip.png")) {
          Write-Error "Missing Assets/KnobFilmstrip.png"
          Write-Host "Please upload your filmstrip PNG to the Assets folder with the exact filename 'KnobFilmstrip.png'."
          exit 1
        }

    - name: Cache JUCE dependencies
      uses: actions/cache@v4
      with:
        # Caches the downloaded JUCE source to speed up subsequent builds
        path: build/_deps
        key: ${{ runner.os }}-juce-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-juce-

    - name: Configure CMake
      # Generates the Visual Studio 2022 project files
      run: cmake -B build -G "Visual Studio 17 2022" -A x64

    - name: Build VST3
      # Compiles only the VST3 target in Release mode
      run: cmake --build build --config Release --target LowFreqVST_VST3

    - name: Upload VST3 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LowFreqVST-VST3-Windows
        path: build/LowFreqVST_artefacts/Release/VST3/